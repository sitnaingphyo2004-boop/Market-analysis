<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback} = React;
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL    = "llama-3.3-70b-versatile";

const CATS = [
{id:“tech”,    label:“Technology”,     icon:“💻”,color:”#00f5d4”},
{id:“finance”, label:“Finance”,        icon:“💰”,color:”#fee440”},
{id:“health”,  label:“Health”,         icon:“🏥”,color:”#f15bb5”},
{id:“retail”,  label:“Retail/E-comm”,  icon:“🛒”,color:”#9b5de5”},
{id:“food”,    label:“Food & Bev”,     icon:“🍔”,color:”#fb5607”},
{id:“edu”,     label:“Education”,      icon:“📚”,color:”#4cc9f0”},
];
const REGIONS = [“Global”,“Southeast Asia”,“Myanmar”,“USA”,“Europe”,“China”];

const SYS = `You are an elite market intelligence analyst. Respond with ONLY a valid JSON object. No markdown. No backticks. No text outside JSON. JSON structure: {"marketOverview":{"summary":"string","marketSize":"string","growthRate":"string","maturity":"emerging/growing/mature/declining","hotness":85},"needsAnalysis":{"coreNeeds":[{"need":"string","description":"string","urgency":"high/medium/low","gap":"string"}],"unmetNeeds":["string"]},"wantsAnalysis":{"topWants":[{"want":"string","description":"string","willingnessToPay":"high/medium/low","trend":"rising/stable/falling"}],"emergingWants":["string"]},"demandAnalysis":{"currentDemand":"string","demandDrivers":["string"],"demandBarriers":["string"],"forecast":"string"},"opportunities":[{"title":"string","description":"string","potential":"high/medium/low","timeToMarket":"string","investment":"string","difficulty":60,"roi":"string","actionSteps":["string"]}],"financialInsights":{"revenueModels":["string"],"avgMargins":"string","breakEvenTimeline":"string","fundingLandscape":"string","keyMetrics":[{"metric":"string","benchmark":"string","importance":"string"}]},"competitiveMap":{"leaders":["string"],"challengers":["string"],"gaps":["string"],"whitespace":"string"},"actionableStrategies":[{"strategy":"string","description":"string","resources":"string","timeline":"string","riskLevel":"low/medium/high"}],"redFlags":["string"],"verdict":"string"}`;

function Modal({onSave}){
const [k,setK]=useState(””); const [err,setErr]=useState(””);
const go=()=>{
if(!k.trim().startsWith(“gsk_”)){setErr(“Groq key သည် gsk_ ဖြင့်စတင်ရမည်”);return;}
onSave(k.trim());
};
return(
<div className="mo"><div className="mb">
<div style={{color:”#00f5d4”,fontSize:18,fontWeight:700}}>◈ MARKET INTEL <span style={{fontSize:10,background:”#00f5d422”,border:“1px solid #00f5d4”,padding:“2px 8px”,borderRadius:20,marginLeft:6}}>FREE</span></div>
<div style={{color:”#5555aa”,fontSize:11,marginTop:6,marginBottom:16,lineHeight:1.7}}>Groq API (အခမဲ့) — LLaMA 3.3 70B model သုံး၍ Market Analysis လုပ်ပေးပါမည်</div>
<div className="step">
<span style={{color:”#00f5d4”,fontWeight:700}}>Step 1.</span> <a href="https://console.groq.com" target="_blank">console.groq.com</a> သွားပါ → Free Sign Up<br/>
<span style={{color:”#00f5d4”,fontWeight:700}}>Step 2.</span> <b>API Keys</b> menu → <b>Create API Key</b> နှိပ်ပါ<br/>
<span style={{color:”#00f5d4”,fontWeight:700}}>Step 3.</span> Key ကို copy ကူးပြီး အောက်တွင် paste လုပ်ပါ
</div>
<div style={{color:”#8080aa”,fontSize:10,marginBottom:6}}>GROQ API KEY</div>
<input className=“mi” type=“password” placeholder=“gsk_xxxxxxxxxxxx” value={k}

{err&&<div style={{color:”#ff4d6d”,fontSize:11,marginTop:5}}>⚠ {err}</div>}
<button className="mbtn" onClick={go}>ENTER DASHBOARD →</button>
<div style={{color:”#3a3a6a”,fontSize:10,marginTop:10,textAlign:“center”}}>Key သည် browser ထဲတွင်သာ သိမ်းဆည်းသည် — server သို့ မပို့ပါ</div>
</div></div>

function Dash({apiKey,onLogout}){
const [cat,setCat]=useState(“finance”);
const [rgn,setRgn]=useState(“Southeast Asia”);
const [loading,setLoading]=useState(false);
const [data,setData]=useState(null);
const [err,setErr]=useState(null);
const [ts,setTs]=useState(null);
const [tab,setTab]=useState(“overview”);
const [q,setQ]=useState(””);

const run=useCallback(async(c,r,qry=””)=>{
setLoading(true);setErr(null);
const msg=qry
?`Market question: "${qry}" — ${c} sector, ${r}. Return ONLY JSON.`
:`Deep market intelligence for ${c} sector in ${r} (2025). Real companies, numbers, Myanmar/SEA context. Return ONLY JSON.`;
try{
const res=await fetch(GROQ_URL,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“Authorization”:`Bearer ${apiKey}`},
body:JSON.stringify({model:MODEL,messages:[{role:“system”,content:SYS},{role:“user”,content:msg}],temperature:.7,max_tokens:2000})
});
if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`HTTP ${res.status}`);}
const j=await res.json();
let t=j.choices?.[0]?.message?.content||””;
t=t.replace(/^`(?:json)?\s*/i,"").replace(/\s*`\s*$/i,””).trim();
const s=t.indexOf(”{”),e2=t.lastIndexOf(”}”);
if(s<0||e2<0)throw new Error(“JSON မတွေ့ပါ — retry လုပ်ပါ”);
setData(JSON.parse(t.slice(s,e2+1)));
setTs(new Date());
}catch(e){setErr(e.message);}
finally{setLoading(false);}
},[apiKey]);

const uc=l=>({high:”#ff4d6d”,medium:”#fee440”,low:”#4cc9f0”}[l]||”#aaa”);
const ti=t=>({rising:“↑”,falling:“↓”,stable:“→”}[t]||“→”);
const tc=t=>({rising:”#00f5d4”,falling:”#ff4d6d”,stable:”#aaa”}[t]||”#aaa”);
const B=(on,col=”#00f5d4”,ex={})=>({padding:“6px 11px”,borderRadius:4,cursor:“pointer”,fontSize:12,fontFamily:“inherit”,border:on?`1px solid ${col}`:“1px solid #1a1a4a”,background:on?`${col}22`:“transparent”,color:on?col:”#5555aa”,transition:“all .2s”,…ex});
const Card=({children,col=”#1a1a4a”,top})=>(<div style={{background:”#0a0a2e”,border:`1px solid ${col}`,borderRadius:6,padding:13,borderTop:top?`3px solid ${top}`:undefined}}>{children}</div>);

return(
<div style={{minHeight:“100vh”,background:”#050510”}}>
{/* HEADER */}
<div style={{background:“linear-gradient(135deg,#0a0a2e,#12124a,#0a0a2e)”,borderBottom:“1px solid #1a1a4a”,padding:“13px 17px”,position:“sticky”,top:0,zIndex:100}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,flexWrap:“wrap”,gap:7}}>
<div>
<span style={{fontSize:17,fontWeight:700,color:”#00f5d4”,letterSpacing:”.1em”}}>◈ MARKET INTEL</span>
<span style={{fontSize:9,background:”#00f5d422”,border:“1px solid #00f5d4”,color:”#00f5d4”,padding:“1px 6px”,borderRadius:20,marginLeft:7,verticalAlign:“middle”}}>FREE · GROQ</span>
<div style={{fontSize:9,color:”#5555aa”,marginTop:2}}>NEEDS · WANTS · DEMAND · FINANCE · OPPORTUNITY</div>
</div>
<div style={{display:“flex”,gap:7,alignItems:“center”}}>
{ts&&<span style={{fontSize:9,color:”#5555aa”}}><span style={{color:”#00f5d4”}}>●</span> {ts.toLocaleTimeString()}</span>}
<button onClick={onLogout} style={{…B(false),fontSize:9,padding:“3px 7px”}}>CHANGE KEY</button>
</div>
</div>
<div style={{marginTop:9,display:“flex”,gap:5,flexWrap:“wrap”}}>
{CATS.map(c=><button key={c.id} style={B(cat===c.id,c.color)} onClick={()=>setCat(c.id)}>{c.icon} {c.label}</button>)}
</div>
<div style={{marginTop:6,display:“flex”,gap:5,flexWrap:“wrap”,alignItems:“center”}}>
{REGIONS.map(r=><button key={r} style={B(rgn===r,”#9b5de5”)} onClick={()=>setRgn(r)}>{r}</button>)}
<button onClick={()=>run(cat,rgn)} disabled={loading} style={{…B(true),marginLeft:“auto”,opacity:loading?.6:1,cursor:loading?“not-allowed”:“pointer”}}>
{loading?“⟳ ANALYZING…”:“⟳ REFRESH”}
</button>
</div>
<div style={{marginTop:6,display:“flex”,gap:6}}>
<input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key===“Enter”&&q&&run(cat,rgn,q)}
placeholder=“Custom question… (e.g. fintech gaps in Myanmar 2025)”
style={{flex:1,padding:“6px 11px”,background:”#0a0a2e”,border:“1px solid #1a1a4a”,borderRadius:4,color:”#e0e0ff”,fontFamily:“inherit”,fontSize:12,outline:“none”}}/>
<button onClick={()=>q&&run(cat,rgn,q)} disabled={!q||loading} style={B(!!q,”#fee440”)}>ASK →</button>
</div>
</div>

          <div style={{color:"#ff4d6d",fontWeight:700,marginBottom:7}}>⚠ RED FLAGS — သတိထားရမည့်အချက်</div>
          {d.redFlags.map((f,i)=><div key={i} style={{color:"#c0c0e0",fontSize:11,marginBottom:3}}>⚡ {f}</div>)}
        </div>}
      </div>}

      {/* COMPETITIVE */}
      {tab==="competitive"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12}}>
        {[["MARKET LEADERS",d.competitiveMap?.leaders,"#ff4d6d"],["CHALLENGERS",d.competitiveMap?.challengers,"#fee440"],["MARKET GAPS",d.competitiveMap?.gaps,"#00f5d4"]].map(([lbl,items,c])=>(

          </div>
        ))}
        <div style={{background:"#0a0a2e",border:"1px solid #9b5de533",borderRadius:6,padding:13,gridColumn:"1/-1"}}>

          <div style={{color:"#c0c0e0",lineHeight:1.7,fontSize:12}}>{d.competitiveMap?.whitespace}</div>

      {/* VERDICT */}
      {d.verdict&&<div style={{marginTop:13,padding:17,background:"linear-gradient(135deg,#0a1a2e,#0a0a2e)",border:"1px solid #00f5d4",borderRadius:6,textAlign:"center"}}>
        <div style={{fontSize:9,color:"#5555aa",marginBottom:7,letterSpacing:".1em"}}>◈ KEY VERDICT</div>
        <div style={{color:"#00f5d4",fontSize:14,fontWeight:700,lineHeight:1.7}}>{d.verdict}</div>
      </div>}
    </>);})()}

);

function App(){
const [k,setK]=useState(()=>sessionStorage.getItem(“gk”)||””);
const save=v=>{sessionStorage.setItem(“gk”,v);setK(v);};
const out=()=>{sessionStorage.removeItem(“gk”);setK(””);};
return k?<Dash apiKey={k} onLogout={out}/>:<Modal onSave={save}/>;
}
ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
